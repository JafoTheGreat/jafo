    const CATS      = ["Article","Video","Podcast","Tool","Research","Other"];
    const CAT_COLOR = { Article:"#47C4FF", Video:"#FF6B35", Podcast:"#B47FFF", Tool:"#E8FF47", Research:"#FF47A3", Other:"#666" };

    function LinksTab() {
      const [url,    setUrl]    = useState("");
      const [title,  setTitle]  = useState("");
      const [cat,    setCat]    = useState("Article");
      const [links,  setLinks]  = useState(() => {
        try { return JSON.parse(localStorage.getItem("jafo_links")||"[]"); } catch { return []; }
      });

      const persist = (updated) => {
        localStorage.setItem("jafo_links", JSON.stringify(updated));
        setLinks(updated);
      };

      const save = () => {
        if(!url.trim()) return;
        const newLink = {
          id: Date.now(),
          url: url.trim(),
          title: title.trim() || url.trim(),
          cat,
          saved: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
          done: false
        };
        persist([newLink, ...links]);
        setUrl(""); setTitle("");
      };

      const toggle = (id) => persist(links.map(l => l.id===id ? {...l,done:!l.done} : l));
      const remove = (id) => persist(links.filter(l => l.id!==id));

      const unread = links.filter(l => !l.done);
      const done   = links.filter(l =>  l.done);

      return (
        <div>

                      <div style={{fontSize:12,color:"#E0DFD8",lineHeight:1.5,marginBottom:3,wordBreak:"break-word"}}>{l.title}</div>

                      <div style={{fontSize:8,color:"#555",marginTop:3}}>Saved {l.saved}</div>

        .ci{display:flex;align-items:flex-start;gap:11px;padding:8px 0;border-bottom:1px solid #111;cursor:pointer;}
        .cb{width:17px;height:17px;border:1.5px solid #252525;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;}
        .card{background:#0d0d0d;border:1px solid #171717;border-radius:6px;padding:15px;margin-bottom:10px;}
        .st{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;line-height:1;}
        .sub{font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-top:2px;margin-bottom:18px;}
        .tag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;}
        .meal{background:#0c0c0c;border:1px solid #151515;border-radius:5px;padding:12px 14px;margin:6px 0;}
        .sbtn{border:none;border-radius:3px;padding:11px 20px;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-weight:600;}
        .stat{background:#0d0d0d;border:1px solid #171717;border-radius:5px;padding:13px;text-align:center;}
        .hist{padding:12px 6px;border-bottom:1px solid #0f0f0f;}
        .fade{animation:fi .2s ease;}
        @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        .lbtn{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:4px;padding:11px 13px;cursor:pointer;display:flex;gap:10px;align-items:center;margin-bottom:7px;}
      `;

      return (
        <div style={{fontFamily:"'DM Mono','Courier New',monospace",background:"#080808",minHeight:"100vh",color:"#E0DFD8"}}>
          <style>{css}</style>

          {/* HEADER */}
          <div style={{padding:"env(safe-area-inset-top,16px) 18px 0",borderBottom:"1px solid #0f0f0f",background:"#080808",position:"sticky",top:0,zIndex:100}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingTop:"max(16px,env(safe-area-inset-top))"}}>
              <div>
                <div style={{fontSize:8,letterSpacing:3,color:"#444",textTransform:"uppercase"}}>JÄFO · AI Chief of Staff</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:4,lineHeight:1,color:"#E0DFD8"}}>FOUNDER DAY</div>
                <div style={{fontSize:8,color:"#555",marginTop:1}}>Monday, March 2 2026 · Lagos</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:8,color:"#555",letterSpacing:2,textTransform:"uppercase"}}>Discipline</div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:42,color:ac,lineHeight:1}}>{avg}</div>
                <div style={{fontSize:8,color:"#252525"}}>/ 10.0</div>
                <div style={{fontSize:8,color:ac,marginTop:2}}>⏳ {daysLeft}d · Sept 14</div>
                {saved && <div style={{fontSize:7,color:"#2a4a2a",letterSpacing:1}}>✓ SAVED</div>}
              </div>
            </div>
            <div style={{marginTop:6,height:1,background:"#0f0f0f",borderRadius:1,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.max(2,100-(daysLeft/200)*100)}%`,background:ac,transition:"width 1s"}}/>
            </div>
            <div style={{display:"flex",gap:2,marginTop:10,overflowX:"auto",paddingBottom:8,WebkitOverflowScrolling:"touch"}}>
              {SECTIONS.map(s=>(
                <button key={s.id} className={`nb ${tab===s.id?"on":""}`}
                  style={tab===s.id?{background:ACCENT[s.id]}:{}}
                  onClick={()=>setTab(s.id)}>
                  {s.emoji} {s.label}
                </button>
              ))}
            </div>
          </div>

          {/* CONTENT */}
          <div style={{maxWidth:780,margin:"0 auto",padding:"20px 16px 80px"}} className="fade" key={tab}>

            {/* ── TODAY ── */}
            {tab==="today" && <div>
              <div className="st" style={{color:"#E8FF47"}}>TODAY'S MAP</div>
              <div className="sub">JÄFO Intelligence · Monday March 2 · 20 events</div>

              {/* JÄFO Monday briefing note */}
              <div style={{background:"#080f0d",border:"1px solid #47FFB430",borderRadius:8,padding:14,marginBottom:14}}>
                <div style={{fontSize:9,color:"#47FFB4",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>🧠 JÄFO Monday Brief</div>
                <div style={{fontSize:12,color:"#666",lineHeight:1.9}}>
                  <strong style={{color:"#E0DFD8"}}>March starts at 5:30 AM.</strong> This is the day that proves Sunday's plan wasn't just intention — it was architecture. Strength Training #1 is on the calendar at 6:30 AM. That's the commitment you made to yourself last night. Everything else the week needs starts with that session happening.
                  <br/><br/>
                  <strong style={{color:"#FF4747"}}>Heavy meeting day</strong> — Marketing stand-up, JRS Ops, Campaign check-ins with Korede. The deep work blocks (Caption & Copy 11 AM, JRS March 14 Prep 3:30 PM, Personal Brand 4:30 PM) are where the real value lives. When meetings run long, protect those blocks. They don't reschedule easily.
                  <br/><br/>
                  <strong style={{color:"#47C4FF"}}>JP Star activates today.</strong> Money received, execution starts. Esther needs to have everything in hand by the marketing stand-up. First performance update to client is Friday March 6 — Esther owns that.
                  <br/><br/>
                  <strong style={{color:"#FF47A3"}}>For Esther sync tonight (9 PM):</strong> FAVE report confirmed sent · Cavemen Tuesday meeting status · Korede's campaign summary should be in by 5 PM — review before EOD sync.
                </div>
              </div>

              {estherSent && esther.priority && (
                <div style={{background:"#0f0810",border:"1px solid #FF47A3",borderRadius:6,padding:12,marginBottom:12}}>
                  <div style={{fontSize:9,color:"#FF47A3",letterSpacing:2,textTransform:"uppercase",marginBottom:5}}>📌 From Esther</div>
                  <div style={{fontSize:12,color:"#E0DFD8",marginBottom:2}}>{esther.priority}</div>
                  {esther.context && <div style={{fontSize:11,color:"#666",marginBottom:2}}>{esther.context}</div>}
                  {esther.flag && <div style={{fontSize:11,color:"#FF47A3"}}>⚑ {esther.flag}</div>}
                </div>
              )}

              {CALENDAR.map(ev=>(
                <div key={ev.id} style={{background:"#0d0d0d",border:"1px solid #171717",borderRadius:6,padding:14,marginBottom:7}}>
                  <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                    <div style={{fontSize:20,flexShrink:0}}>{ev.emoji}</div>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:5}}>
                        <div>
                          <div style={{fontSize:9,color:ev.color,letterSpacing:1.5,textTransform:"uppercase"}}>{ev.time}</div>
                          <div style={{fontSize:13,color:"#E0DFD8"}}>{ev.title}</div>
                          <div style={{fontSize:9,color:"#666",marginTop:1}}>{ev.subtitle}</div>
                        </div>
                        <span className="tag" style={{background:ev.color+"18",color:ev.color,height:"fit-content"}}>{ev.type}</span>
                      </div>
                      <div style={{fontSize:10,color:"#555",marginTop:7,borderLeft:`2px solid ${ev.color}25`,paddingLeft:8}}>{ev.desc}</div>
                      {ev.detail && <div style={{fontSize:9,color:"#666",marginTop:4,paddingLeft:10}}>→ {ev.detail}</div>}
                    </div>
                  </div>
                  <div className="ci" onClick={()=>setCheck("ev_"+ev.id)}>
                    <div className="cb" style={{background:checks["ev_"+ev.id]?ev.color:"transparent",borderColor:checks["ev_"+ev.id]?ev.color:"#252525"}}>

                    </div>
                    <div style={{fontSize:9,color:"#555"}}>Mark complete</div>
                  </div>

            {/* ── BODY ── */}
            {tab==="body" && <div>
              <div className="st" style={{color:"#E8FF47"}}>BODY</div>

                <div style={{textAlign:"right",fontSize:10,color:"#777",lineHeight:2}}>
                  <div>Now: 225–234 lbs</div>
                  <div>Goal: 220–225 lbs</div>
                  <div>Streak: <span style={{color:"#E8FF47"}}>{streak}d</span></div>
                </div>
              </div>

              <div style={{background:"#0c0c08",border:"1px solid #E8FF4725",borderRadius:7,padding:15,marginBottom:10}}>
                <div style={{fontSize:9,color:"#E8FF47",letterSpacing:2,textTransform:"uppercase"}}>Monday Training</div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:30,color:"#E8FF47",marginTop:2}}>Strength #1 + Walk + Cardio</div>
                <div style={{height:1,background:"linear-gradient(to right,#E8FF47,transparent)",margin:"10px 0",opacity:.18}}/>
                <div style={{fontSize:11,color:"#555",lineHeight:1.9}}>
                  <strong style={{color:"#E8FF47"}}>6:30 AM — Strength Training #1</strong> · First session of March. Show up regardless of how it feels. Done beats perfect.<br/>
                  <strong style={{color:"#E8FF47"}}>7:15 AM — Walk 2 Miles</strong> · Post-strength flush. Easy pace. This is recovery, not cardio.<br/>
                  <strong style={{color:"#47FFB4"}}>8:00 AM — Stretch & Core</strong> · Calves, hamstrings, hip flexors (legs took a beating this weekend). 10 min core after.<br/>
                  <strong style={{color:"#E8FF47"}}>6:00 PM — Cardio 2 Miles</strong> · Evening run. Fat loss work. Non-negotiable.
                </div>
              </div>

              {Object.values(MEALS).map((m,i)=>(
                <div key={i} className="meal">
                  <div style={{fontSize:9,color:"#E8FF47",letterSpacing:1.5,textTransform:"uppercase"}}>{m.time}</div>
                  <div style={{fontSize:13,color:"#E0DFD8",margin:"3px 0 2px"}}>{m.name}</div>
                  <div style={{fontSize:11,color:"#555"}}>{m.items}</div>
                  <div style={{fontSize:9,color:"#555",marginTop:3}}>→ {m.why}</div>
                </div>
              ))}

              <div style={{display:"flex",gap:8,marginTop:10,flexWrap:"wrap"}}>
                {[
                  {c:"#47FFB4",bg:"#0a1410",label:"💧 Water",val:"3.5 L"},
                  {c:"#FF4747",bg:"#120d0d",label:"🚫 Avoid",val:"After 8:30 PM"},
                  {c:"#B47FFF",bg:"#0e0a14",label:"✅ Cheat",val:"1x weekly"},
                ].map(b=>(
                  <div key={b.label} style={{flex:1,minWidth:100,background:b.bg,border:`1px solid ${b.c}20`,borderRadius:5,padding:10}}>
                    <div style={{fontSize:9,color:b.c,letterSpacing:2,textTransform:"uppercase"}}>{b.label}</div>
                    <div style={{fontFamily:"'Bebas Neue'",fontSize:16,color:b.c,marginTop:2}}>{b.val}</div>
                  </div>
                ))}
              </div>

              <div className="card" style={{marginTop:10}}>
                <div style={{fontSize:9,color:"#666",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>Body note / how you're feeling:</div>
                <textarea rows={2} placeholder="Energy level, soreness, sleep quality last night..." value={notes.bodynote||""} onChange={e=>setNote("bodynote",e.target.value)}/>
              </div>
            </div>}

            {/* ── SPIRIT ── */}
            {tab==="spirit" && <div>
              <div className="st" style={{color:"#FF6B35"}}>SPIRIT</div>
              <div className="sub">Monday — the week starts in the spirit before it starts in the calendar.</div>

              <div style={{background:"#110d08",border:"1px solid #FF6B3525",borderRadius:8,padding:15,marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:9,color:"#FF6B35",letterSpacing:2,textTransform:"uppercase"}}>🙏 Daily Affirmation — Speak Aloud</div>
                  <button onClick={()=>setAffOpen(!affOpen)} style={{background:"none",border:"1px solid #2a1a10",borderRadius:2,color:"#FF6B35",fontSize:8,cursor:"pointer",padding:"3px 7px",fontFamily:"inherit",letterSpacing:1,textTransform:"uppercase"}}>
                    {affOpen?"Close":"Open"}
                  </button>
                </div>
                {affOpen
                  ? AFFIRMATION.split("\n").map((line,i)=>(
                      <div key={i} style={{padding:"2px 0",fontSize:12,color:line.startsWith("In the name")||line.startsWith("Amen")?"#E0DFD8":"#666",fontStyle:line.startsWith("In the name")||line.startsWith("Amen")?"normal":"italic",fontFamily:"'Playfair Display',serif",lineHeight:1.9}}>
                        {line||<br/>}
                      </div>
                    ))
                  : <div style={{fontSize:12,color:"#555",fontStyle:"italic",fontFamily:"'Playfair Display',serif"}}>"With humility and hope, I evoke divine discernment..."</div>
                }
                <div className="ci" style={{marginTop:8}} onClick={()=>setCheck("aff_spoken")}>
                  <div className="cb" style={{background:checks.aff_spoken?"#FF6B35":"transparent",borderColor:checks.aff_spoken?"#FF6B35":"#252525"}}>
                    {checks.aff_spoken&&<span style={{fontSize:8,color:"#080808"}}>✓</span>}
                  </div>
                  <div style={{fontSize:9,color:checks.aff_spoken?"#FF6B35":"#333"}}>I spoke this aloud today</div>
                </div>
              </div>

              <div className="card" style={{marginBottom:10}}>
                <div style={{fontSize:9,color:"#FF6B35",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>🪞 Identity · This Season</div>
                <div style={{fontSize:13,color:"#E0DFD8",lineHeight:1.8,fontFamily:"'Playfair Display',serif"}}>
                  "I am Joshua — a founder who builds <em style={{color:"#FF6B35"}}>legacy, not just revenue</em>. I am disciplined in my body, clear in my mind, and rooted in God. The man I am becoming is already present in the choices I make today."
                </div>
              </div>

              <div style={{background:"#110d08",border:"1px solid #FF6B3525",borderRadius:8,padding:15,marginBottom:10}}>
                <div style={{fontSize:9,color:"#FF6B35",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>📖 {scripture.ref} — Monday's Word</div>
                <div style={{fontSize:14,color:"#E0DFD8",lineHeight:1.7,fontStyle:"italic",fontFamily:"'Playfair Display',serif",marginBottom:10}}>"{scripture.text}"</div>
                <div style={{height:1,background:"linear-gradient(to right,#FF6B35,transparent)",margin:"10px 0",opacity:.18}}/>
                <div style={{fontSize:9,color:"#FF6B35",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Monday embodiment</div>
                <div style={{fontSize:11,color:"#666",lineHeight:1.8,marginBottom:8}}>Yesterday God said <em style={{color:"#FF6B35"}}>"SIT WITH ME. I am dependable. Reliable."</em> That word doesn't expire on Sunday — carry it into this week. Every meeting, every decision, every moment you feel the pressure of March building — He is dependable. He is reliable. You don't have to hold it all together. Act from that place today.</div>
                <textarea rows={2} placeholder="What is God saying to me specifically this Monday?" value={notes.embody||""} onChange={e=>setNote("embody",e.target.value)}/>
                <div className="ci" style={{marginTop:8}} onClick={()=>setCheck("embody_lived")}>
                  <div className="cb" style={{background:checks.embody_lived?"#FF6B35":"transparent",borderColor:checks.embody_lived?"#FF6B35":"#252525"}}>
                    {checks.embody_lived&&<span style={{fontSize:8,color:"#080808"}}>✓</span>}
                  </div>
                  <div style={{fontSize:9,color:checks.embody_lived?"#FF6B35":"#333"}}>I carried this word into my day</div>
                </div>
              </div>

              <div className="card" style={{marginBottom:10}}>
                <div style={{fontSize:9,color:"#B47FFF",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>🌙 Dreams & Recurring Thoughts</div>
                <textarea rows={3} placeholder="Last night I dreamed... / A thought that keeps returning..." value={notes.dreams||""} onChange={e=>setNote("dreams",e.target.value)}/>
              </div>

              <div className="card">
                <div style={{fontSize:9,color:"#FF6B35",letterSpacing:2,textTransform:"uppercase",marginBottom:6}}>✍️ Monday Journal Prompt</div>
                <div style={{fontSize:13,color:"#E0DFD8",lineHeight:1.7,marginBottom:8,fontStyle:"italic",fontFamily:"'Playfair Display',serif"}}>
                  "What does self-identity as non-negotiable actually look like in today's decisions — in the meetings, in the moments where you could drift?"
                </div>
                <textarea rows={5} placeholder="Write freely. No editing. Just truth..." value={notes.journal||""} onChange={e=>setNote("journal",e.target.value)}/>
              </div>
            </div>}

            {/* ── MIND ── */}
            {tab==="mind" && <div>
              <div className="st" style={{color:"#47C4FF"}}>MIND</div>
              <div className="sub">Monday — feed the mind daily, without exception.</div>

              {/* DAILY READING HABIT */}
              <div style={{background:"#080e11",border:"1px solid #47C4FF30",borderRadius:8,padding:15,marginBottom:12}}>
                <div style={{fontSize:9,color:"#47C4FF",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>📚 Daily Reading — Non-Negotiable</div>
                <div style={{fontSize:10,color:"#666",marginBottom:12}}>Every day. Not when you feel like it. The mind compounds the same way money does.</div>
                {[
                  {key:"read_book",    label:"📖 1 Chapter of a book", note:"Any chapter. Keep it moving."},
                  {key:"read_news",    label:"📰 Newspaper / Current affairs", note:"Stay informed. Know what world you're operating in."},
                  {key:"read_industry",label:"🎵 Music / Culture / Industry read", note:"1 article or newsletter relevant to what you're building."},
                  {key:"read_invest",  label:"📈 Investment / Financial read", note:"Markets, macro, one thing that sharpens your investor lens."},
                  {key:"read_bible",   label:"✝️ Bible Study / Devotion", note:"Not optional. The foundation everything else stands on."},
                ].map(item=>(
                  <div key={item.key} style={{marginBottom:10}}>
                    <div className="ci" onClick={()=>setCheck(item.key)}>
                      <div className="cb" style={{background:checks[item.key]?"#47C4FF":"transparent",borderColor:checks[item.key]?"#47C4FF":"#252525"}}>
                        {checks[item.key]&&<span style={{fontSize:8,color:"#080808"}}>✓</span>}
                      </div>
                      <div>
                        <div style={{fontSize:11,color:checks[item.key]?"#2a2a2a":"#E0DFD8",textDecoration:checks[item.key]?"line-through":"none"}}>{item.label}</div>
                        <div style={{fontSize:9,color:"#555",marginTop:1}}>{item.note}</div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>

              {/* WHAT DID YOU LEARN TODAY */}
              <div className="card" style={{border:"1px solid #47C4FF20"}}>
                <div style={{fontSize:9,color:"#47C4FF",letterSpacing:2,textTransform:"uppercase",marginBottom:5}}>💡 What Did You Learn Today?</div>
                <div style={{fontSize:10,color:"#666",marginBottom:8}}>One thing. Could be from a book, a meeting, a conversation, a moment of quiet. Write it down before it dissolves.</div>
                <textarea rows={3} placeholder="Today I learned..." value={notes.learned||""} onChange={e=>setNote("learned",e.target.value)}/>
              </div>

              {/* DEEP WORK BLOCKS */}
              <div style={{background:"#080e11",border:"1px solid #47C4FF25",borderRadius:8,padding:15,marginBottom:12,marginTop:10}}>
                <div style={{fontSize:9,color:"#47C4FF",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>⚡ Today's Deep Work Blocks</div>

                <div style={{fontSize:9,color:"#47C4FF",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>11:00 AM — Caption & Copy Review</div>
                {[
                  "JRS newsletter: outline → first full draft (tone: personal, soulful, curatorial)",
                  "ATIDE social captions for the week — review assets from designer",
                  "JP Star campaign copy — review and approve anything going out this week",
                  "Feedback to Esther by 1 PM",
                ].map(item=>(
                  <div key={item} className="ci" onClick={()=>setCheck("copy_"+item)}>
                    <div className="cb" style={{background:checks["copy_"+item]?"#47C4FF":"transparent",borderColor:checks["copy_"+item]?"#47C4FF":"#252525"}}>
                      {checks["copy_"+item]&&<span style={{fontSize:8,color:"#080808"}}>✓</span>}
                    </div>
                    <div style={{fontSize:10,color:checks["copy_"+item]?"#2a2a2a":"#666",textDecoration:checks["copy_"+item]?"line-through":"none",lineHeight:1.5}}>{item}</div>
                  </div>
                ))}

                <div style={{height:1,background:"linear-gradient(to right,#47C4FF,transparent)",margin:"12px 0",opacity:.12}}/>

                <div style={{fontSize:9,color:"#47C4FF",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>3:30 PM — JRS March 14 Listening Session Prep</div>
                {[
                  "Event concept & experience design — vibe, flow, what moment do guests leave with?",
                  "Guest list — curate intentionally, who gets personal touch from Joshua?",
                  "Logistics checklist — venue, sound, food, photography confirmed?",
                  "Content & promo — what goes out this week? What's captured on the night?",
                  "Output: one-page event brief ready for Esther",
                ].map(item=>(
                  <div key={item} className="ci" onClick={()=>setCheck("jrs14_"+item)}>
                    <div className="cb" style={{background:checks["jrs14_"+item]?"#47C4FF":"transparent",borderColor:checks["jrs14_"+item]?"#47C4FF":"#252525"}}>
                      {checks["jrs14_"+item]&&<span style={{fontSize:8,color:"#080808"}}>✓</span>}
                    </div>
                    <div style={{fontSize:10,color:checks["jrs14_"+item]?"#2a2a2a":"#666",textDecoration:checks["jrs14_"+item]?"line-through":"none",lineHeight:1.5}}>{item}</div>
                  </div>
                ))}

                <div style={{height:1,background:"linear-gradient(to right,#47C4FF,transparent)",margin:"12px 0",opacity:.12}}/>

                <div style={{fontSize:9,color:"#FF6B35",letterSpacing:1.5,textTransform:"uppercase",marginBottom:6}}>4:30 PM — Personal Brand & Content</div>
                {[
                  "Update @JoshiAhazie → @JoshuaAhazie across Instagram, Twitter/X, LinkedIn, TikTok",
                  "Substack brainstorm — map out first 3 post concepts (positioning · truth · industry take)",
                  "Article brainstorm — 3 to 5 pieces you've been meaning to write, one title + one-line premise each",
                  "Which one could you write this week if you had 90 minutes?",
                  "Output: Substack 3-post plan + article list saved as a note",
                ].map(item=>(
                  <div key={item} className="ci" onClick={()=>setCheck("brand_"+item)}>
                    <div className="cb" style={{background:checks["brand_"+item]?"#FF6B35":"transparent",borderColor:checks["brand_"+item]?"#FF6B35":"#252525"}}>
                      {checks["brand_"+item]&&<span style={{fontSize:8,color:"#080808"}}>✓</span>}
                    </div>
                    <div style={{fontSize:10,color:checks["brand_"+item]?"#2a2a2a":"#666",textDecoration:checks["brand_"+item]?"line-through":"none",lineHeight:1.5}}>{item}</div>
                  </div>
                ))}

                  txt += `Days logged: ${days.length}\n\n${"═".repeat(50)}\n\n`;
                  days.forEach(([dk,d])=>{
                    const label=new Date(dk+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});

                    if(d?.notes?.learned)  txt+=`Learned: ${d.notes.learned}\n`;
                    txt+="\n";
                  });
                  const blob=new Blob([txt],{type:"text/plain"});
                  const u=URL.createObjectURL(blob);

                  a.href=u; a.download=`jafo-summary-${new Date().toISOString().split("T")[0]}.txt`;
                  a.click(); URL.revokeObjectURL(u);
                }} style={{background:"#E8FF47",color:"#080808",border:"none",borderRadius:3,padding:"10px 16px",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"inherit",fontWeight:700,cursor:"pointer",width:"100%"}}>

                  if(done.length){ txt+=`COMPLETED (${done.length})\n${"─".repeat(30)}\n`; done.forEach(l=>{txt+=`✓ ${l.title}\n${l.url}\n\n`;}); }
                  const blob=new Blob([txt],{type:"text/plain"});
