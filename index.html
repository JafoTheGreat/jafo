    // ── WEDNESDAY MARCH 4 — LIVE CALENDAR DATA ───────────────────────────────
    const CALENDAR = [
      { id:"pray",      time:"5:30 AM – 6:00 AM",  title:"Wake Up & Pray",                         subtitle:"Recurring · Morning anchor",                    type:"SACRED",  color:"#FFD147", emoji:"🙏",

      { id:"drive",     time:"11:30 AM – 12:00 PM", title:"Drive to 16by16",                       subtitle:"16 Kofo Abayomi St, Victoria Island",             type:"MOVE",    color:"#E0DFD8", emoji:"🚗",
        desc:"30 minutes to VI. Come in with the social media plan for Prince — he needs to know where each video lands in the sequence." },
      { id:"prince",    time:"12:00 PM – 2:00 PM",  title:"ATIDE Video 02 — Storyboard + Edit Session", subtitle:"With Prince · 16by16 · 2 hrs",             type:"MEETING", color:"#FF47A3", emoji:"🎬",
        desc:"Part 1 (12:00–12:45): Walk Prince through V01–V05 brief. Storyboard V02 together — existing footage + new shots + motion pass. Confirm shoot date (Mar 10 or 11). Confirm V03 and V04 approach. Part 2 (12:45–1:45): Review V01 colour grade. Specific feedback only — what's working, what changes, one more round or locked? Align on timeline: V01 locked Mar 12, V02/V03/V04 locked Mar 15, all exports done Mar 16.",

      { id:"dubem",     time:"2:00 PM – 4:00 PM",   title:"Asset Creation + Dubem Creative Alignment", subtitle:"With Dubem · 16by16 · Retainer close at 3 PM", type:"MEETING", color:"#FF47A3", emoji:"🎨",
        desc:"Part 1 (2:00–3:00): Walk Dubem through the finalised social media plan — what's coming, in what order, when. Brief launch week assets: brand statement graphic, landing page visuals, wave tease, services carousel. Each asset: dimensions, copy, deadline. No vague asks. Part 2 (3:00–3:45): The retainer conversation. Offer is sent — ₦150–200k/month, part-time, deliverable-based. Come in confident.",
        detail:"Exit: assets briefed, retainer decision made or follow-up dated. Don't leave without one of those two." },
      { id:"jazzhole",  time:"5:00 PM – 6:00 PM",   title:"Jazzhole / Piano",                      subtitle:"Decompression · Record hunting or piano",         type:"SACRED",  color:"#FF47A3", emoji:"🎵",
        desc:"If Jazzhole has good energy: dig for records for Mar 14 — Women in African Music and Evolution of Alte. Trust your ear. If Jazzhole isn't the vibe: go home and play piano. Either way: decompression. Let the afternoon settle." },
      { id:"calls",     time:"6:30 PM – 7:30 PM",   title:"Relationship Block",                     subtitle:"Yemi · Ruby · Beever · Nii Sai",                 type:"PEOPLE",  color:"#FF47A3", emoji:"📞",
        desc:"Call Yemi — your former lawyer and good friend. Tell him how things are going, ask for advice during this phase, speak sincerely. He knows you and pushed you toward self-work. Also Ruby — you're tempted to go see him, but you already know the right call on a Wednesday. Call instead. Stay on your rails tonight." },

    const SCRIPTURES = [

    const AFFIRMATION = `With humility and hope, I evoke divine discernment for every decision I will make today.
May the wisdom from above guide each choice, and may the Lord's presence be the beacon that illuminates my life.

In the name of Jesus — I reject confusion, hesitation, and doubt that may obscure my vision.
Deliver me, Lord, from distractions and false voices that seek to lead me astray.

I ask, Lord, for complete healing of my body, mind, and spirit —
and that the peace that surpasses all understanding be my fortress.

May Your blessing cover us, may Your protection surround us,
and may we be shielded from all evil.

I implore Your generosity in my life.
May new horizons open before me, filled with Your grace and contentment.
Amen.`;

    const MEALS = {
      breakfast: { name:"Egg Sauce",                   items:"Eggs in tomato/pepper sauce · bread or plantain on the side",                      time:"11:00 AM",  why:"Post-workout protein. Send Maraynn money for the market before you leave the house." },
      lunch:     { name:"Snack on the Go",              items:"Meat pie or sandwich en route · or grab something at 16 during the session break",  time:"~1:30 PM",  why:"Keep it light. Creative meetings 12–4 PM — you need focus, not a food coma." },
      dinner:    { name:"Amala · 100 Hours, Ikoyi",     items:"Amala + ewedu/gbegiri + protein · 100 Awolowo Rd, Ikoyi",                          time:"7:30 PM",   why:"Soul food. Enjoy it, eat well. Go home after — you already know the right call on a Wednesday is to stay on your rails." },
    };

    const SECTIONS = [
      { id:"today",    emoji:"📅", label:"TODAY"    },
      { id:"body",     emoji:"💪", label:"BODY"     },
      { id:"spirit",   emoji:"🔥", label:"SPIRIT"   },
      { id:"mind",     emoji:"⚡", label:"MIND"     },
      { id:"business", emoji:"🎯", label:"BUSINESS" },
      { id:"energy",   emoji:"🛡️", label:"ENERGY"   },
      { id:"eod",      emoji:"🌙", label:"EOD"      },
      { id:"patterns", emoji:"📊", label:"PATTERNS" },
    ];

    const ACCENT = {
      today:"#E8FF47", body:"#E8FF47", spirit:"#FF6B35",
      mind:"#47C4FF", business:"#B47FFF", energy:"#47FFB4",
      eod:"#FFD147", patterns:"#47FFB4"
    };

    const SEPT14  = new Date("2026-09-14");
    const daysLeft = Math.ceil((SEPT14 - new Date()) / 86400000);
    const scripture = SCRIPTURES[0];

    const STORE_KEY = "jafo_v4";
    const todayKey  = () => "2026-03-04";
    function loadData() { try { return JSON.parse(localStorage.getItem(STORE_KEY)||"{}"); } catch { return {}; } }
    function saveData(d) { try { localStorage.setItem(STORE_KEY,JSON.stringify(d)); } catch {} }

    // ── LINKS ─────────────────────────────────────────────────────────────────
    const CATS      = ["Article","Video","Podcast","Tool","Research","Other"];
    const CAT_COLOR = { Article:"#47C4FF",Video:"#FF6B35",Podcast:"#B47FFF",Tool:"#E8FF47",Research:"#FF47A3",Other:"#666" };

    function LinksTab() {
      const [url,setUrl]=useState(""); const [title,setTitle]=useState(""); const [cat,setCat]=useState("Article");
      const [links,setLinks]=useState(()=>{ try{return JSON.parse(localStorage.getItem("jafo_links")||"[]");}catch{return [];} });
      const persist=(u)=>{ localStorage.setItem("jafo_links",JSON.stringify(u)); setLinks(u); };
      const save=()=>{ if(!url.trim())return; persist([{id:Date.now(),url:url.trim(),title:title.trim()||url.trim(),cat,saved:new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),done:false},...links]); setUrl("");setTitle(""); };
      const toggle=(id)=>persist(links.map(l=>l.id===id?{...l,done:!l.done}:l));
      const remove=(id)=>persist(links.filter(l=>l.id!==id));
      const unread=links.filter(l=>!l.done); const done=links.filter(l=>l.done);
      return (
        <div>
          <div style={{height:1,background:"linear-gradient(to right,#47C4FF,transparent)",margin:"20px 0",opacity:.15}}/>
          <div style={{fontSize:9,color:"#47C4FF",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>🔗 LINKS — Read / Watch Later</div>
          <div style={{background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:7,padding:14,marginBottom:14}}>

            <input type="text" placeholder="Title (optional)..." value={title} onChange={e=>setTitle(e.target.value)} style={{marginBottom:10}}/>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {CATS.map(c=><button key={c} onClick={()=>setCat(c)} style={{background:cat===c?CAT_COLOR[c]+"22":"transparent",border:`1px solid ${cat===c?CAT_COLOR[c]:"#222"}`,borderRadius:3,padding:"4px 10px",fontSize:9,color:cat===c?CAT_COLOR[c]:"#444",cursor:"pointer",fontFamily:"inherit",letterSpacing:1,textTransform:"uppercase"}}>{c}</button>)}
            </div>
            <button onClick={save} style={{background:"#FF6B35",color:"#080808",border:"none",borderRadius:3,padding:"10px 18px",fontSize:10,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"inherit",fontWeight:600,cursor:"pointer",width:"100%"}}>Save Link</button>
          </div>
          {unread.length>0&&<div><div style={{fontSize:9,color:"#666",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>To Read/Watch — {unread.length}</div>

    // ── APP ───────────────────────────────────────────────────────────────────
    function App() {
      const [tab,setTab]=useState("today");
      const [all,setAll]=useState(()=>{ const d=loadData(); const k=todayKey(); if(!d[k])d[k]={notes:{},checks:{},scores:{focus:7,health:7,emotion:7,strategy:7},esther:{priority:"",context:"",flag:""}}; return d; });
      const [saved,setSaved]=useState(false);
      const [affOpen,setAffOpen]=useState(false);
      const [estherSent,setEstherSent]=useState(false);
      const saveRef=useRef(null);
      const tk=todayKey();
      const td=all[tk]||{notes:{},checks:{},scores:{focus:7,health:7,emotion:7,strategy:7},esther:{priority:"",context:"",flag:""}};
      useEffect(()=>{ clearTimeout(saveRef.current); saveRef.current=setTimeout(()=>{saveData(all);setSaved(true);setTimeout(()=>setSaved(false),1800);},600); },[all]);
      const setNote =(k,v)=>setAll(p=>{const n={...p};n[tk]={...n[tk],notes:{...n[tk].notes,[k]:v}};return n;});
      const setCheck=(k)  =>setAll(p=>{const n={...p};n[tk]={...n[tk],checks:{...n[tk].checks,[k]:!n[tk].checks[k]}};return n;});
      const setScore=(k,v)=>setAll(p=>{const n={...p};n[tk]={...n[tk],scores:{...n[tk].scores,[k]:v}};return n;});
      const setEst  =(k,v)=>setAll(p=>{const n={...p};n[tk]={...n[tk],esther:{...n[tk].esther,[k]:v}};return n;});
      const checks=td.checks||{}; const notes=td.notes||{}; const scores=td.scores||{focus:7,health:7,emotion:7,strategy:7}; const esther=td.esther||{priority:"",context:"",flag:""};
      const avg=(Object.values(scores).reduce((a,b)=>a+b,0)/4).toFixed(1);
      const ac=ACCENT[tab]||"#E8FF47";
      const allDays=Object.entries(all).filter(([k])=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort(([a],[b])=>a>b?1:-1);
      const last7=allDays.slice(-7);
      const avg7=(key)=>{ const v=last7.map(([,d])=>d?.scores?.[key]).filter(Number); return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):"—"; };
      const streak=(()=>{ let s=0; for(let i=allDays.length-1;i>=0;i--){if(allDays[i][1]?.checks?.["eodb_workout"])s++;else break;} return s; })();

      const css=`
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{font-family:'DM Mono','Courier New',monospace;background:#080808;color:#E0DFD8;min-height:100vh;}
        ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:#1e1e1e;}
        textarea,input[type=text]{outline:none;background:#0d0d0d;border:1px solid #1e1e1e;color:#E0DFD8;border-radius:4px;padding:9px 11px;font-family:inherit;font-size:13px;resize:vertical;width:100%;line-height:1.7;}
        textarea:focus,input[type=text]:focus{border-color:${ac};}
        input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:#1e1e1e;}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:${ACCENT.eod};cursor:pointer;}
        .nb{background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:3px;font-family:inherit;font-size:9px;letter-spacing:1.5px;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
        .nb.on{color:#080808;font-weight:600;}
        .nb:not(.on){color:#3a3a3a;}
        .ci{display:flex;align-items:flex-start;gap:11px;padding:8px 0;border-bottom:1px solid #111;cursor:pointer;}
        .cb{width:17px;height:17px;border:1.5px solid #252525;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;}
        .card{background:#0d0d0d;border:1px solid #171717;border-radius:6px;padding:15px;margin-bottom:10px;}
        .st{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;line-height:1;}
        .sub{font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-top:2px;margin-bottom:18px;}
        .tag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;}
        .meal{background:#0c0c0c;border:1px solid #151515;border-radius:5px;padding:12px 14px;margin:6px 0;}
        .stat{background:#0d0d0d;border:1px solid #171717;border-radius:5px;padding:13px;text-align:center;}
        .hist{padding:12px 6px;border-bottom:1px solid #0f0f0f;}
        .fade{animation:fi .2s ease;}
        @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
      `;

      return (
        <div style={{fontFamily:"'DM Mono','Courier New',monospace",background:"#080808",minHeight:"100vh",color:"#E0DFD8"}}>
          <style>{css}</style>

          {/* HEADER */}
          <div style={{padding:"env(safe-area-inset-top,16px) 18px 0",borderBottom:"1px solid #0f0f0f",background:"#080808",position:"sticky",top:0,zIndex:100}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingTop:"max(16px,env(safe-area-inset-top))"}}>
              <div>
                <div style={{fontSize:8,letterSpacing:3,color:"#444",textTransform:"uppercase"}}>JÄFO · AI Chief of Staff</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:4,lineHeight:1,color:"#E0DFD8"}}>FOUNDER DAY</div>
                <div style={{fontSize:8,color:"#555",marginTop:1}}>Wednesday, March 4 2026 · Lagos</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:8,color:"#555",letterSpacing:2,textTransform:"uppercase"}}>Discipline</div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:42,color:ac,lineHeight:1}}>{avg}</div>
                <div style={{fontSize:8,color:"#252525"}}>/ 10.0</div>
                <div style={{fontSize:8,color:ac,marginTop:2}}>⏳ {daysLeft}d · Sept 14</div>
                {saved&&<div style={{fontSize:7,color:"#2a4a2a",letterSpacing:1}}>✓ SAVED</div>}
              </div>
            </div>
            <div style={{marginTop:6,height:1,background:"#0f0f0f",borderRadius:1,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.max(2,100-(daysLeft/200)*100)}%`,background:ac,transition:"width 1s"}}/>
            </div>
            <div style={{display:"flex",gap:2,marginTop:10,overflowX:"auto",paddingBottom:8,WebkitOverflowScrolling:"touch"}}>
              {SECTIONS.map(s=>(
                <button key={s.id} className={`nb ${tab===s.id?"on":""}`} style={tab===s.id?{background:ACCENT[s.id]}:{}} onClick={()=>setTab(s.id)}>
                  {s.emoji} {s.label}
                </button>
              ))}
            </div>
          </div>

          {/* CONTENT */}
          <div style={{maxWidth:780,margin:"0 auto",padding:"20px 16px 80px"}} className="fade" key={tab}>

            {/* TODAY */}
            {tab==="today"&&<div>
              <div className="st" style={{color:"#E8FF47"}}>TODAY'S MAP</div>
              <div className="sub">JÄFO Intelligence · Wednesday March 4 · 17 events</div>

              <div style={{background:"#080f0d",border:"1px solid #47FFB430",borderRadius:8,padding:14,marginBottom:14}}>

                  <div style={{background:"#0c0c08",border:"1px solid #E8FF4715",borderRadius:6,padding:12}}>
                    <div style={{fontSize:9,color:"#E8FF47",letterSpacing:2,textTransform:"uppercase"}}>Workout Streak</div>
                    <div style={{fontFamily:"'Bebas Neue'",fontSize:30,color:"#E8FF47",lineHeight:1.1}}>{streak}</div>
                    <div style={{fontSize:8,color:"#555",marginTop:2}}>days</div>
                  </div>
                  <div style={{background:"#0c0c08",border:"1px solid #E8FF4715",borderRadius:6,padding:12}}>
                    <div style={{fontSize:9,color:"#E8FF47",letterSpacing:2,textTransform:"uppercase"}}>Sept 14</div>
                    <div style={{fontFamily:"'Bebas Neue'",fontSize:30,color:"#E8FF47",lineHeight:1.1}}>{daysLeft}</div>
                    <div style={{fontSize:8,color:"#555",marginTop:2}}>days out</div>
                  </div>
                </div>

                {/* ── WORD BANK ROLL-UP ── */}
                <div style={{background:"#080e11",border:"1px solid #47C4FF20",borderRadius:8,padding:14,marginBottom:12}}>
                  <div style={{fontSize:9,color:"#47C4FF",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>🗂 Word Bank — This Week</div>
                  {allWords.length>0
                    ?<div>{allWords.map((w,i)=><span key={i} style={{display:"inline-block",background:"#47C4FF18",border:"1px solid #47C4FF30",borderRadius:3,padding:"3px 10px",margin:"3px 4px 3px 0",fontSize:11,color:"#47C4FF"}}>{w}</span>)}</div>
                    :<div style={{fontSize:11,color:"#333"}}>No words logged yet this week.</div>
                  }
                </div>

                {/* ── PAYMENT TOTAL ── */}
                <div style={{background:"#0a0a0f",border:"1px solid #B47FFF20",borderRadius:8,padding:14,marginBottom:12}}>
                  <div style={{fontSize:9,color:"#B47FFF",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>💸 Payments — This Week</div>
                  {allPayments.length>0?(
                    <div>
                      {allPayments.map((p,i)=><div key={i} style={{fontSize:11,color:"#666",padding:"4px 0",borderBottom:"1px solid #111"}}>₦ {p}</div>)}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:10}}>
                        <div style={{fontSize:9,color:"#B47FFF",letterSpacing:2,textTransform:"uppercase"}}>Week Total</div>
                        <div style={{fontFamily:"'Bebas Neue'",fontSize:24,color:"#B47FFF"}}>₦{paymentTotal.toLocaleString()}</div>
                      </div>
                    </div>
                  ):<div style={{fontSize:11,color:"#333"}}>No payments logged yet this week.</div>}
                </div>

                {/* ── PAST ENTRIES ── */}
                <div style={{fontSize:9,color:"#666",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Past Entries</div>
                {allDays.length<=1
                  ?<div style={{fontSize:11,color:"#555",textAlign:"center",padding:"30px 0"}}>No past entries yet. Come back tomorrow.</div>
                  :allDays.slice().reverse().filter(([k])=>k!==tk).map(([dk,d])=>{
                    const s=d?.scores; const da=s?((s.focus+s.health+s.emotion+s.strategy)/4).toFixed(1):"—";
                    const lbl=new Date(dk+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
                    return <div key={dk} className="hist">
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:5}}>
                        <div>
                          <div style={{fontSize:11,color:"#777"}}>{lbl}</div>
                          {d?.notes?.tomorrow&&<div style={{fontSize:9,color:"#555",marginTop:2,fontStyle:"italic"}}>Lock-in: "{d.notes.tomorrow}"</div>}
                          {d?.notes?.wordbank&&<div style={{fontSize:8,color:"#333",marginTop:2}}>{d.notes.wordbank.split("\n").filter(Boolean).map((w,i)=><span key={i} style={{display:"inline-block",background:"#47C4FF12",borderRadius:2,padding:"1px 6px",margin:"0 3px 0 0",fontSize:8,color:"#47C4FF55"}}>{w}</span>)}</div>}
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:parseFloat(da)>=7?"#47FFB4":parseFloat(da)>=5?"#FFD147":"#FF4747"}}>{da}</div>
                        </div>
                      </div>
                    </div>;
                  })
                }

                {/* ── EXPORT ── */}
                <div style={{height:1,background:"linear-gradient(to right,#47FFB4,transparent)",margin:"20px 0",opacity:.15}}/>
                <div style={{fontSize:9,color:"#47FFB4",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>💾 Export Your Data</div>
                {[
                  {label:"Full Data (JSON)",sublabel:"Everything — paste into Claude for weekly analysis.",color:"#47FFB4",btnLabel:"⬇ Download JSON",action:()=>{const data=loadData();const lnks=JSON.parse(localStorage.getItem("jafo_links")||"[]");const blob=new Blob([JSON.stringify({jafo_entries:data,saved_links:lnks,exported_at:new Date().toISOString()},null,2)],{type:"application/json"});const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=`jafo-data-${new Date().toISOString().split("T")[0]}.json`;a.click();URL.revokeObjectURL(u);}},
                  {label:"Weekly Summary (TXT)",sublabel:"Clean human-readable file.",color:"#E8FF47",btnLabel:"⬇ Download Summary TXT",action:()=>{const data=loadData();const days=Object.entries(data).filter(([k])=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort(([a],[b])=>a>b?1:-1);let txt="JÄFO — Weekly Summary\n\n";days.forEach(([dk,d])=>{const s=d?.scores;const av=s?((s.focus+s.health+s.emotion+s.strategy)/4).toFixed(1):"—";txt+=`${dk} — ${av}/10\n`;if(d?.notes?.truth)txt+=`Truth: ${d.notes.truth}\n`;if(d?.notes?.tomorrow)txt+=`Lock-in: ${d.notes.tomorrow}\n`;if(d?.notes?.wordbank)txt+=`Words: ${d.notes.wordbank.split("\n").filter(Boolean).join(", ")}\n`;if(d?.notes?.payments)txt+=`Payments: ${d.notes.payments}\n`;txt+="\n";});const blob=new Blob([txt],{type:"text/plain"});const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=`jafo-summary-${new Date().toISOString().split("T")[0]}.txt`;a.click();URL.revokeObjectURL(u);}},
                ].map((btn,i)=>(
                  <div key={i} style={{background:"#0d0d0d",border:"1px solid #171717",borderRadius:7,padding:13,marginBottom:8}}>
                    <div style={{fontSize:9,color:btn.color,letterSpacing:1.5,textTransform:"uppercase",marginBottom:3}}>{btn.label}</div>
                    <div style={{fontSize:9,color:"#666",marginBottom:10}}>{btn.sublabel}</div>
                    <button onClick={btn.action} style={{background:btn.color,color:"#080808",border:"none",borderRadius:3,padding:"10px 16px",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"inherit",fontWeight:700,cursor:"pointer",width:"100%"}}>{btn.btnLabel}</button>
                  </div>
                ))}
                <div style={{background:"#0a0a0a",border:"1px solid #111",borderRadius:5,padding:11,marginTop:4}}>
                  <div style={{fontSize:9,color:"#555",lineHeight:2}}>
                    Days logged: <span style={{color:"#47FFB4"}}>{Object.keys(loadData()).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)).length}</span> &nbsp;·&nbsp;
                    Links saved: <span style={{color:"#FF6B35"}}>{JSON.parse(localStorage.getItem("jafo_links")||"[]").length}</span> &nbsp;·&nbsp;
                    Device only — never sent to any server.
                  </div>
                </div>
              </div>;
            })()}

          </div>

          <div style={{borderTop:"1px solid #0d0d0d",padding:"10px 16px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6,paddingBottom:"max(10px,env(safe-area-inset-bottom))"}}>
            <div style={{fontSize:7,color:"#1a1a1a",letterSpacing:3,textTransform:"uppercase"}}>JÄFO · Wednesday March 4 2026</div>
            <div style={{fontSize:7,color:"#1a1a1a",letterSpacing:2,textTransform:"uppercase"}}>Energy · Revenue · Never Ego</div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App/>, document.getElementById("root"));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
