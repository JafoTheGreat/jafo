  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ── SUNDAY MARCH 1 — LIVE CALENDAR DATA ───────────────────────────────────
    const CALENDAR = [
      {

      {

        desc:"Sunday walk is your spiritual reset, not just cardio. No agenda. Let the mind decompress before the planning session."
      },
      {
        id:"breakfast", time:"9:30 AM – 10:00 AM", title:"Breakfast",

      {

      {

      {

        desc:"Eat by 7. Belly fat reduction lives here. Late eating is your #1 friction zone. Guard this hard stop."
      },
      {
        id:"sync", time:"9:00 PM – 10:00 PM", title:"Joshua × Esther Weekly Sync",
        subtitle:"Set by Esther · Recurring · Weekly", type:"TEAM", color:"#FF47A3", emoji:"👤",
        desc:"Weekly sync before the week starts. Align on priorities, flags, and what Esther needs from you to run Monday well. Come with your Plan the Week outputs."
      },
      {
        id:"endday", time:"9:30 PM – 10:00 PM", title:"End Day with God — Prayer & Reflection",
        subtitle:"Review the day spiritually · Bible study · Journal · Pray", type:"SACRED", color:"#FFD147", emoji:"✝️",
        desc:"Review the day spiritually. Revisit Bible study notes. Journal reflections. Pray before sleeping. Everything bends around this."
      },
    ];

    const SCRIPTURES = [
      { ref:"Proverbs 4:7", text:"Wisdom is the principal thing; therefore get wisdom. And in all your getting, get understanding.", embodiment:"Every decision today is an act of stewardship over the understanding God gave you. Ask before you act." },
      { ref:"Psalm 1:3", text:"He shall be like a tree planted by the rivers of water, that brings forth its fruit in its season.", embodiment:"You are in a planting season. Systems, habits, discipline. The fruit is coming. Don't demand harvest before the roots are deep." },
      { ref:"Isaiah 40:31", text:"But those who wait on the Lord shall renew their strength; they shall mount up with wings like eagles.", embodiment:"When you feel overwhelmed mid-sprint — pause. That is not a sign to push harder. Wait. Then proceed with clarity." },
      { ref:"Philippians 4:6–7", text:"Be anxious for nothing, but in everything by prayer and supplication, with thanksgiving, let your requests be made known to God.", embodiment:"Before your first task, before your phone — present it to God. Let His peace guard your mind today." },
      { ref:"Proverbs 21:5", text:"The plans of the diligent lead surely to plenty, but those of everyone who is hasty, surely to poverty.", embodiment:"Don't rush today's work. Done well today means months of leverage ahead." },
      { ref:"Joshua 1:9", text:"Be strong and courageous. Do not be afraid; do not be discouraged, for the Lord your God will be with you wherever you go.", embodiment:"Your name is Joshua. You were born to lead into the next territory. Step forward where today asks you to be bold." },
      { ref:"Romans 12:2", text:"Do not be conformed to this world, but be transformed by the renewing of your mind.", embodiment:"Every learning block, every podcast, every chapter is renewing your mind. Protect that time. The transformation happens in daily repetition." },
    ];

    const AFFIRMATION = `With humility and hope, I evoke divine discernment for every decision I will make today.
May the wisdom from above guide each choice, and may the Lord's presence be the beacon that illuminates my life.

In the name of Jesus — I reject confusion, hesitation, and doubt that may obscure my vision.
Deliver me, Lord, from distractions and false voices that seek to lead me astray.
I cry out for security and clarity, trusting that You are guiding my steps.

I ask, Lord, for complete healing of my body, mind, and spirit —
and that the peace that surpasses all understanding be my fortress.
Protect me and my loved ones. I declare that all circumstances work in our favor.
May Your blessing cover us, may Your protection surround us,
and may we be shielded from all evil.

I implore Your generosity in my life.
May new horizons open before me, filled with Your grace and contentment.
Amen.`;

    const MEALS = {
      breakfast: { name:"Oatmeal + Fruit", items:"Rolled oats · banana · handful of berries · black coffee or hibiscus tea", time:"9:30 AM", why:"Light, anti-inflammatory. Church day — you want energy without heaviness." },
      meal1: { name:"Post-Church Meal — Jollof Rice & Turkey", items:"Jollof rice · grilled turkey · side salad", time:"2:30 PM", why:"Earned carbs after church. Grilled protein keeps it goal-aligned." },
      snack: { name:"Kilishi + Zobo", items:"30g kilishi · chilled zobo (no added sugar)", time:"5:00 PM", why:"Fuels the planning session without spiking blood sugar." },
      meal2: { name:"Pepper Soup", items:"Light chicken or fish pepper soup · water", time:"7:00 PM", why:"Anti-inflammatory. Light. Hard stop. Kitchen closes 8:30 PM." },
    };

    const SECTIONS = [
      { id:"today",    emoji:"📅", label:"TODAY"    },
      { id:"body",     emoji:"💪", label:"BODY"     },
      { id:"spirit",   emoji:"🔥", label:"SPIRIT"   },
      { id:"mind",     emoji:"⚡", label:"MIND"     },
      { id:"business", emoji:"🎯", label:"BUSINESS" },
      { id:"energy",   emoji:"🛡️", label:"ENERGY"   },
      { id:"eod",      emoji:"🌙", label:"EOD"      },
      { id:"patterns", emoji:"📊", label:"PATTERNS" },
    ];

    const ACCENT = {
      today:"#E8FF47", body:"#E8FF47", spirit:"#FF6B35",
      mind:"#47C4FF", business:"#B47FFF", energy:"#47FFB4",
      eod:"#FFD147", patterns:"#47FFB4"
    };

    const BIRTHDAY = new Date("2026-09-14");
    const daysLeft = Math.ceil((BIRTHDAY - new Date()) / 86400000);

    // Sunday scripture
    const scripture = SCRIPTURES[0]; // Proverbs 4:7 — wisdom for a planning day

    // ── STORAGE ───────────────────────────────────────────────────────────────
    const STORE_KEY = "jafo_v4";
    const todayKey  = () => "2026-03-01";

    function loadData() {
      try { return JSON.parse(localStorage.getItem(STORE_KEY) || "{}"); }
      catch { return {}; }
    }
    function saveData(d) {
      try { localStorage.setItem(STORE_KEY, JSON.stringify(d)); } catch {}
    }

    // ── APP ───────────────────────────────────────────────────────────────────
    // ── LINKS TAB COMPONENT ───────────────────────────────────────────────────
    const CATS      = ["Article","Video","Podcast","Tool","Research","Other"];
    const CAT_COLOR = { Article:"#47C4FF", Video:"#FF6B35", Podcast:"#B47FFF", Tool:"#E8FF47", Research:"#FF47A3", Other:"#666" };

    function LinksTab() {
      const [url,    setUrl]    = useState("");
      const [title,  setTitle]  = useState("");
      const [cat,    setCat]    = useState("Article");
      const [links,  setLinks]  = useState(() => {
        try { return JSON.parse(localStorage.getItem("jafo_links")||"[]"); } catch { return []; }
      });

      const persist = (updated) => {
        localStorage.setItem("jafo_links", JSON.stringify(updated));
        setLinks(updated);
      };

      const save = () => {
        if(!url.trim()) return;
        const newLink = {
          id: Date.now(),
          url: url.trim(),
          title: title.trim() || url.trim(),
          cat,
          saved: new Date().toLocaleDateString("en-US",{month:"short",day:"numeric"}),
          done: false
        };
        persist([newLink, ...links]);
        setUrl(""); setTitle("");
      };

      const toggle = (id) => persist(links.map(l => l.id===id ? {...l,done:!l.done} : l));
      const remove = (id) => persist(links.filter(l => l.id!==id));

      const unread = links.filter(l => !l.done);
      const done   = links.filter(l =>  l.done);

      return (
        <div>
          <div className="st" style={{color:"#FF6B35"}}>LINKS</div>
          <div className="sub">Read later · Watch later · Save for reference.</div>

          {/* Input */}
          <div style={{background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:7,padding:14,marginBottom:14}}>
            <div style={{fontSize:9,color:"#FF6B35",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>+ Save a Link</div>
            <input type="text" placeholder="Paste URL here..." value={url} onChange={e=>setUrl(e.target.value)} style={{marginBottom:7}}/>
            <input type="text" placeholder="Title or description (optional)..." value={title} onChange={e=>setTitle(e.target.value)} style={{marginBottom:10}}/>
            <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
              {CATS.map(c=>(
                <button key={c} onClick={()=>setCat(c)}
                  style={{background:cat===c?CAT_COLOR[c]+"22":"transparent",border:`1px solid ${cat===c?CAT_COLOR[c]:"#222"}`,borderRadius:3,padding:"4px 10px",fontSize:9,color:cat===c?CAT_COLOR[c]:"#444",cursor:"pointer",fontFamily:"inherit",letterSpacing:1,textTransform:"uppercase"}}>
                  {c}
                </button>
              ))}
            </div>
            <button onClick={save}
              style={{background:"#FF6B35",color:"#080808",border:"none",borderRadius:3,padding:"10px 18px",fontSize:10,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"inherit",fontWeight:600,cursor:"pointer",width:"100%"}}>
              Save Link
            </button>
          </div>

          {/* Unread */}
          {unread.length > 0 && (
            <div>
              <div style={{fontSize:9,color:"#333",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>
                To Read/Watch — {unread.length} item{unread.length!==1?"s":""}
              </div>
              {unread.map(l=>(
                <div key={l.id} style={{background:"#0d0d0d",border:"1px solid #171717",borderRadius:6,padding:12,marginBottom:7}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                    <div style={{flex:1,minWidth:0}}>
                      <span className="tag" style={{background:CAT_COLOR[l.cat]+"18",color:CAT_COLOR[l.cat],marginBottom:5,display:"inline-block"}}>{l.cat}</span>
                      <div style={{fontSize:12,color:"#E0DFD8",lineHeight:1.5,marginBottom:3,wordBreak:"break-word"}}>{l.title}</div>
                      <div style={{fontSize:9,color:"#2a2a2a",wordBreak:"break-all"}}>{l.url.length>60?l.url.slice(0,60)+"...":l.url}</div>
                      <div style={{fontSize:8,color:"#1e1e1e",marginTop:3}}>Saved {l.saved}</div>
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:5,flexShrink:0}}>
                      <a href={l.url} target="_blank" rel="noreferrer"
                        style={{background:"#1a1a1a",color:"#E0DFD8",border:"none",borderRadius:2,padding:"5px 9px",fontSize:8,cursor:"pointer",fontFamily:"inherit",letterSpacing:1,textDecoration:"none",textAlign:"center"}}>
                        OPEN
                      </a>
                      <button onClick={()=>toggle(l.id)}
                        style={{background:"#47FFB422",color:"#47FFB4",border:"1px solid #47FFB430",borderRadius:2,padding:"5px 9px",fontSize:8,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>
                        DONE
                      </button>
                      <button onClick={()=>remove(l.id)}
                        style={{background:"transparent",color:"#2a2a2a",border:"1px solid #1a1a1a",borderRadius:2,padding:"5px 9px",fontSize:8,cursor:"pointer",fontFamily:"inherit",letterSpacing:1}}>
                        DEL
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Done */}
          {done.length > 0 && (
            <div style={{marginTop:16}}>
              <div style={{fontSize:9,color:"#1e1e1e",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Completed — {done.length}</div>
              {done.map(l=>(
                <div key={l.id} style={{background:"#0a0a0a",border:"1px solid #111",borderRadius:6,padding:10,marginBottom:5,display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                  <span style={{fontSize:9,color:"#1e1e1e",textDecoration:"line-through",flex:1,minWidth:0}}>{l.title}</span>
                  <button onClick={()=>remove(l.id)} style={{background:"transparent",color:"#222",border:"none",fontSize:10,cursor:"pointer",padding:"2px 6px"}}>✕</button>
                </div>
              ))}
            </div>
          )}

          {links.length === 0 && (
            <div style={{textAlign:"center",padding:"40px 0",fontSize:11,color:"#1e1e1e"}}>
              No links saved yet.<br/>Paste a URL above to start your reading list.
            </div>
          )}
        </div>
      );
    }

    // ── APP ───────────────────────────────────────────────────────────────────
    function App() {
      const [tab, setTab] = useState("today");
      const [all, setAll] = useState(() => {
        const d = loadData();
        const k = todayKey();
        if (!d[k]) d[k] = { notes:{}, checks:{}, scores:{focus:7,health:7,emotion:7,strategy:7}, esther:{priority:"",context:"",flag:""} };
        return d;
      });
      const [saved,       setSaved]       = useState(false);
      const [affOpen,     setAffOpen]     = useState(false);
      const [learnDone,   setLearnDone]   = useState({});
      const [estherSent,  setEstherSent]  = useState(false);
      const saveRef = useRef(null);

      const tk = todayKey();
      const td = all[tk] || { notes:{}, checks:{}, scores:{focus:7,health:7,emotion:7,strategy:7}, esther:{priority:"",context:"",flag:""} };

      useEffect(() => {
        clearTimeout(saveRef.current);
        saveRef.current = setTimeout(() => { saveData(all); setSaved(true); setTimeout(()=>setSaved(false),1800); }, 600);
      }, [all]);

      const setNote  = (k,v) => setAll(p => { const n={...p}; n[tk]={...n[tk],notes:{...n[tk].notes,[k]:v}}; return n; });
      const setCheck = (k)   => setAll(p => { const n={...p}; n[tk]={...n[tk],checks:{...n[tk].checks,[k]:!n[tk].checks[k]}}; return n; });
      const setScore = (k,v) => setAll(p => { const n={...p}; n[tk]={...n[tk],scores:{...n[tk].scores,[k]:v}}; return n; });
      const setEst   = (k,v) => setAll(p => { const n={...p}; n[tk]={...n[tk],esther:{...n[tk].esther,[k]:v}}; return n; });

      const checks = td.checks||{};
      const notes  = td.notes||{};
      const scores = td.scores||{focus:7,health:7,emotion:7,strategy:7};
      const esther = td.esther||{priority:"",context:"",flag:""};
      const avg    = (Object.values(scores).reduce((a,b)=>a+b,0)/4).toFixed(1);
      const ac     = ACCENT[tab]||"#E8FF47";

      const allDays = Object.entries(all).filter(([k])=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort(([a],[b])=>a>b?1:-1);
      const last7   = allDays.slice(-7);
      const avg7 = (key) => { const v=last7.map(([,d])=>d?.scores?.[key]).filter(Number); return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):"—"; };
      const streak  = (() => { let s=0; for(let i=allDays.length-1;i>=0;i--){ if(allDays[i][1]?.checks?.["eodb_workout"]) s++; else break; } return s; })();

      const css = `
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        body{font-family:'DM Mono','Courier New',monospace;background:#080808;color:#E0DFD8;min-height:100vh;}
        ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:#1e1e1e;}
        textarea,input[type=text]{outline:none;background:#0d0d0d;border:1px solid #1e1e1e;color:#E0DFD8;border-radius:4px;padding:9px 11px;font-family:inherit;font-size:13px;resize:vertical;width:100%;line-height:1.7;}
        textarea:focus,input[type=text]:focus{border-color:${ac};}
        input[type=range]{-webkit-appearance:none;width:100%;height:3px;border-radius:2px;background:#1e1e1e;}
        input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:${ACCENT.eod};cursor:pointer;}
        .nb{background:none;border:none;cursor:pointer;padding:8px 10px;border-radius:3px;font-family:inherit;font-size:9px;letter-spacing:1.5px;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
        .nb.on{color:#080808;font-weight:600;}
        .nb:not(.on){color:#3a3a3a;}
        .ci{display:flex;align-items:flex-start;gap:11px;padding:8px 0;border-bottom:1px solid #111;cursor:pointer;}
        .cb{width:17px;height:17px;border:1.5px solid #252525;border-radius:2px;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;}
        .card{background:#0d0d0d;border:1px solid #171717;border-radius:6px;padding:15px;margin-bottom:10px;}
        .st{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:3px;line-height:1;}
        .sub{font-size:9px;color:#2e2e2e;letter-spacing:2px;text-transform:uppercase;margin-top:2px;margin-bottom:18px;}
        .tag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;}
        .meal{background:#0c0c0c;border:1px solid #151515;border-radius:5px;padding:12px 14px;margin:6px 0;}
        .sbtn{border:none;border-radius:3px;padding:11px 20px;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-weight:600;}
        .stat{background:#0d0d0d;border:1px solid #171717;border-radius:5px;padding:13px;text-align:center;}
        .hist{padding:12px 6px;border-bottom:1px solid #0f0f0f;}
        .fade{animation:fi .2s ease;}
        @keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
        .lbtn{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:4px;padding:11px 13px;cursor:pointer;display:flex;gap:10px;align-items:center;margin-bottom:7px;}
      `;

      return (
        <div style={{fontFamily:"'DM Mono','Courier New',monospace",background:"#080808",minHeight:"100vh",color:"#E0DFD8"}}>
          <style>{css}</style>

          {/* HEADER */}
          <div style={{padding:"env(safe-area-inset-top,16px) 18px 0",borderBottom:"1px solid #0f0f0f",background:"#080808",position:"sticky",top:0,zIndex:100}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",paddingTop:"max(16px,env(safe-area-inset-top))"}}>
              <div>
                <div style={{fontSize:8,letterSpacing:3,color:"#2a2a2a",textTransform:"uppercase"}}>JÄFO · AI Chief of Staff</div>
                <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:36,letterSpacing:4,lineHeight:1,color:"#E0DFD8"}}>FOUNDER DAY</div>
                <div style={{fontSize:8,color:"#222",marginTop:1}}>Sunday, March 1 2026 · Lagos</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:8,color:"#2a2a2a",letterSpacing:2,textTransform:"uppercase"}}>Discipline</div>
                <div style={{fontFamily:"'Bebas Neue'",fontSize:42,color:ac,lineHeight:1}}>{avg}</div>
                <div style={{fontSize:8,color:"#252525"}}>/ 10.0</div>
                <div style={{fontSize:8,color:ac,marginTop:2}}>⏳ {daysLeft}d · Sept 14</div>
                {saved && <div style={{fontSize:7,color:"#2a4a2a",letterSpacing:1}}>✓ SAVED</div>}
              </div>
            </div>
            <div style={{marginTop:6,height:1,background:"#0f0f0f",borderRadius:1,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${Math.max(2,100-(daysLeft/200)*100)}%`,background:ac,transition:"width 1s"}}/>
            </div>
            <div style={{display:"flex",gap:2,marginTop:10,overflowX:"auto",paddingBottom:8,WebkitOverflowScrolling:"touch"}}>
              {SECTIONS.map(s=>(
                <button key={s.id} className={`nb ${tab===s.id?"on":""}`}
                  style={tab===s.id?{background:ACCENT[s.id]}:{}}
                  onClick={()=>setTab(s.id)}>
                  {s.emoji} {s.label}
                </button>
              ))}
            </div>

                  {q:"Did I plan from wisdom or from anxiety?",k:"sp_wisdom"},
                  {q:"What emotion did I carry into the week?",k:"sp_emo"},
                ].map(item=>(
                  <div key={item.k} style={{marginBottom:8}}>
                    <div style={{fontSize:11,color:"#555",marginBottom:3}}>{item.q}</div>
                    <textarea rows={1} style={{minHeight:36}} placeholder="Honest answer..." value={notes[item.k]||""} onChange={e=>setNote(item.k,e.target.value)}/>
                  </div>
                ))}
              </div>

              <div style={{background:"#0a0810",border:"1px solid #150d25",borderRadius:7,padding:13,marginBottom:8}}>
                <div style={{fontSize:9,color:"#B47FFF",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>🎯 BUSINESS / PLANNING</div>
                {[
                  ["eodbi_fin","Monthly financial tracking completed"],
                  ["eodbi_plan","Plan the Week session fully completed"],
                  ["eodbi_auto","Assistant Brief System built + Esther briefed"],
                  ["eodbi_sync","Joshua × Esther weekly sync done"],
                ].map(([k,label])=>(
                  <div key={k} className="ci" onClick={()=>setCheck(k)}>
                    <div className="cb" style={{background:checks[k]?"#B47FFF":"transparent",borderColor:checks[k]?"#B47FFF":"#222"}}>
                      {checks[k]&&<span style={{fontSize:8,color:"#fff"}}>✓</span>}
                    </div>
                    <div style={{fontSize:11,color:checks[k]?"#333":"#666",textDecoration:checks[k]?"line-through":"none"}}>{label}</div>
                  </div>
                ))}
              </div>

              <div style={{background:"#0d0d0a",border:"1px solid #222200",borderRadius:7,padding:13,marginBottom:8}}>
                <div style={{fontSize:9,color:"#FFD147",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>📊 DISCIPLINE SCORE</div>
                {[["Focus","focus"],["Health","health"],["Emotional Regulation","emotion"],["Strategic Execution","strategy"]].map(([label,key])=>(
                  <div key={key} style={{marginBottom:11}}>
                    <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                      <div style={{fontSize:11,color:"#555"}}>{label}</div>
                      <div style={{fontFamily:"'Bebas Neue'",fontSize:20,color:"#FFD147"}}>{scores[key]}</div>
                    </div>
                    <input type="range" min={1} max={10} value={scores[key]} onChange={e=>setScore(key,+e.target.value)}/>
                  </div>
                ))}
                <div style={{textAlign:"center",marginTop:6}}>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:44,color:"#FFD147",lineHeight:1}}>{avg}<span style={{fontSize:18,color:"#2a2a2a"}}> / 10</span></div>
                </div>
              </div>

              <div style={{background:"#0d0809",border:"1px solid #251018",borderRadius:7,padding:13,marginBottom:8}}>
                <div style={{fontSize:9,color:"#FF47A3",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>🪞 REAL TRUTH</div>
                <textarea rows={3} placeholder="The story I told myself was... The truth is..." value={notes.truth||""} onChange={e=>setNote("truth",e.target.value)}/>
              </div>

              <div style={{background:"#090d09",border:"2px solid #47FFB4",borderRadius:7,padding:13}}>
                <div style={{fontSize:9,color:"#47FFB4",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>🔒 MONDAY LOCK-IN</div>
                <div style={{fontSize:9,color:"#2a2a2a",marginBottom:6}}>ONE move. The single most important thing Monday must deliver.</div>
                <textarea rows={2} placeholder="Monday I will non-negotiably..." value={notes.tomorrow||""} onChange={e=>setNote("tomorrow",e.target.value)}/>
              </div>
            </div>}

            {/* ── PATTERNS ── */}
            {tab==="patterns" && <div>
              <div className="st" style={{color:"#47FFB4"}}>PATTERNS</div>
              <div className="sub">JÄFO Intelligence · {allDays.length} days logged</div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
                {[
                  {label:"Focus 7d",val:avg7("focus"),color:"#47C4FF"},
                  {label:"Health 7d",val:avg7("health"),color:"#E8FF47"},
                  {label:"Emotion 7d",val:avg7("emotion"),color:"#FF6B35"},
                  {label:"Execution 7d",val:avg7("strategy"),color:"#B47FFF"},
                ].map(s=>(
                  <div key={s.label} className="stat">
                    <div style={{fontSize:9,color:"#333",letterSpacing:1.5,textTransform:"uppercase",marginBottom:3}}>{s.label}</div>
                    <div style={{fontFamily:"'Bebas Neue'",fontSize:34,color:s.val==="—"?"#222":s.color}}>{s.val}</div>
                  </div>
                ))}
              </div>

              <div style={{background:"#0c0c08",border:"1px solid #E8FF4715",borderRadius:6,padding:12,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:9,color:"#E8FF47",letterSpacing:2,textTransform:"uppercase"}}>Workout Streak</div>
                  <div style={{fontFamily:"'Bebas Neue'",fontSize:30,color:"#E8FF47"}}>{streak} DAYS</div>
                </div>
                <div style={{fontSize:9,color:"#333",textAlign:"right",lineHeight:2}}>
                  <div>{allDays.length} days logged</div>
                  <div>{daysLeft} days to Sept 14</div>
                </div>
              </div>

              {last7.length > 0 && (
                <div className="card" style={{marginBottom:12}}>
                  <div style={{fontSize:9,color:"#47FFB4",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>Score — Last {last7.length} Days</div>
                  <div style={{display:"flex",gap:5,alignItems:"flex-end",height:55}}>
                    {last7.map(([dk,d])=>{
                      const s=d?.scores;
                      const da=s?((s.focus+s.health+s.emotion+s.strategy)/4):0;
                      const h=Math.round((da/10)*55);
                      const isT=dk===tk;
                      const lbl=new Date(dk+"T12:00:00").toLocaleDateString("en-US",{weekday:"short"});
                      return (
                        <div key={dk} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                          <div style={{fontSize:8,color:isT?"#47FFB4":"#2a2a2a"}}>{da>0?da.toFixed(1):""}</div>
                          <div style={{width:"100%",height:h,background:isT?"#47FFB4":"#1e3e2e",borderRadius:2,minHeight:2}}/>
                          <div style={{fontSize:7,color:isT?"#47FFB4":"#2a2a2a",letterSpacing:1}}>{lbl}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              <div style={{fontSize:9,color:"#333",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>Past Entries</div>
              {allDays.length <= 1
                ? <div style={{fontSize:11,color:"#2a2a2a",textAlign:"center",padding:"30px 0"}}>No past entries yet. Come back tomorrow.</div>
                : allDays.slice().reverse().filter(([k])=>k!==tk).map(([dk,d])=>{
                    const s=d?.scores;
                    const da=s?((s.focus+s.health+s.emotion+s.strategy)/4).toFixed(1):"—";
                    const lbl=new Date(dk+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
                    const trained=d?.checks?.["eodb_workout"];
                    return (
                      <div key={dk} className="hist">
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:5}}>
                          <div>
                            <div style={{fontSize:11,color:"#777"}}>{lbl}</div>
                            {d?.notes?.tomorrow && <div style={{fontSize:9,color:"#444",marginTop:2,fontStyle:"italic"}}>Lock-in: "{d.notes.tomorrow}"</div>}
                            {d?.notes?.journal && <div style={{fontSize:8,color:"#2e2e2e"}}>📝 journal saved</div>}
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{fontFamily:"'Bebas Neue'",fontSize:22,color:parseFloat(da)>=7?"#47FFB4":parseFloat(da)>=5?"#FFD147":"#FF4747"}}>{da}</div>
                            {trained && <div style={{fontSize:8,color:"#E8FF47"}}>💪 trained</div>}
                          </div>
                        </div>
                      </div>
                    );
                  })
              }

              {/* ── EXPORT — embedded in Patterns ── */}
              <div style={{height:1,background:"linear-gradient(to right,#47FFB4,transparent)",margin:"20px 0",opacity:.15}}/>
              <div style={{fontSize:9,color:"#47FFB4",letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>💾 Export Your Data</div>

              <div style={{background:"#0d0d0d",border:"1px solid #171717",borderRadius:7,padding:13,marginBottom:8}}>
                <div style={{fontSize:9,color:"#47FFB4",letterSpacing:1.5,textTransform:"uppercase",marginBottom:3}}>Full Data (JSON)</div>
                <div style={{fontSize:9,color:"#333",marginBottom:10}}>Everything — paste into Claude for weekly pattern analysis.</div>
                <button onClick={()=>{
                  const data = loadData();
                  const lnks = JSON.parse(localStorage.getItem("jafo_links")||"[]");
                  const full = { jafo_entries: data, saved_links: lnks, exported_at: new Date().toISOString() };
                  const blob = new Blob([JSON.stringify(full,null,2)],{type:"application/json"});
                  const u = URL.createObjectURL(blob);
                  const a = document.createElement("a");
                  a.href=u; a.download=`jafo-data-${new Date().toISOString().split("T")[0]}.json`;
                  a.click(); URL.revokeObjectURL(u);
                }} style={{background:"#47FFB4",color:"#080808",border:"none",borderRadius:3,padding:"10px 16px",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"inherit",fontWeight:700,cursor:"pointer",width:"100%"}}>
                  ⬇ Download JSON
                </button>
              </div>

              <div style={{background:"#0d0d0d",border:"1px solid #171717",borderRadius:7,padding:13,marginBottom:8}}>
                <div style={{fontSize:9,color:"#E8FF47",letterSpacing:1.5,textTransform:"uppercase",marginBottom:3}}>Readable Weekly Summary (TXT)</div>
                <div style={{fontSize:9,color:"#333",marginBottom:10}}>Clean human-readable file. Print, share, or paste into notes.</div>
                <button onClick={()=>{
                  const data = loadData();
                  const days = Object.entries(data).filter(([k])=>k.match(/^\d{4}-\d{2}-\d{2}$/)).sort(([a],[b])=>a>b?1:-1);
                  let txt = "JÄFO — Weekly Summary\n";
                  txt += `Exported: ${new Date().toLocaleDateString("en-US",{weekday:"long",year:"numeric",month:"long",day:"numeric"})}\n`;
                  txt += `Days logged: ${days.length}\n\n${"═".repeat(50)}\n\n`;
                  days.forEach(([dk,d])=>{
                    const label=new Date(dk+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"});
                    const s=d?.scores;
                    const av=s?((s.focus+s.health+s.emotion+s.strategy)/4).toFixed(1):"—";
                    txt+=`📅 ${label}\nDiscipline: ${av}/10  (Focus:${s?.focus||"—"} Health:${s?.health||"—"} Emotion:${s?.emotion||"—"} Execution:${s?.strategy||"—"})\n`;
                    if(d?.notes?.journal)  txt+=`Journal: ${d.notes.journal}\n`;
                    if(d?.notes?.truth)    txt+=`Real Truth: ${d.notes.truth}\n`;
                    if(d?.notes?.tomorrow) txt+=`Lock-In: ${d.notes.tomorrow}\n`;
                    if(d?.notes?.dreams)   txt+=`Dreams: ${d.notes.dreams}\n`;
                    if(d?.notes?.bodynote) txt+=`Body: ${d.notes.bodynote}\n`;
                    if(d?.notes?.learned)  txt+=`Learned: ${d.notes.learned}\n`;
                    txt+="\n";
                  });
                  const blob=new Blob([txt],{type:"text/plain"});
                  const u=URL.createObjectURL(blob);
                  const a=document.createElement("a");
                  a.href=u; a.download=`jafo-summary-${new Date().toISOString().split("T")[0]}.txt`;
                  a.click(); URL.revokeObjectURL(u);
                }} style={{background:"#E8FF47",color:"#080808",border:"none",borderRadius:3,padding:"10px 16px",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"inherit",fontWeight:700,cursor:"pointer",width:"100%"}}>
                  ⬇ Download Summary TXT
                </button>
              </div>

              <div style={{background:"#0d0d0d",border:"1px solid #171717",borderRadius:7,padding:13,marginBottom:8}}>
                <div style={{fontSize:9,color:"#FF6B35",letterSpacing:1.5,textTransform:"uppercase",marginBottom:3}}>Saved Links (TXT)</div>
                <div style={{fontSize:9,color:"#333",marginBottom:10}}>Your full reading/watching list.</div>
                <button onClick={()=>{
                  const lnks=JSON.parse(localStorage.getItem("jafo_links")||"[]");
                  if(!lnks.length){alert("No links saved yet.");return;}
                  let txt="JÄFO — Saved Links\n"+`Exported: ${new Date().toLocaleDateString()}\n\n`;
                  const unread=lnks.filter(l=>!l.done), done=lnks.filter(l=>l.done);
                  if(unread.length){ txt+=`TO READ/WATCH (${unread.length})\n${"─".repeat(30)}\n`; unread.forEach(l=>{txt+=`[${l.cat}] ${l.title}\n${l.url}\nSaved: ${l.saved}\n\n`;}); }
                  if(done.length){ txt+=`COMPLETED (${done.length})\n${"─".repeat(30)}\n`; done.forEach(l=>{txt+=`✓ ${l.title}\n${l.url}\n\n`;}); }
                  const blob=new Blob([txt],{type:"text/plain"});
                  const u=URL.createObjectURL(blob);
                  const a=document.createElement("a");
                  a.href=u; a.download=`jafo-links-${new Date().toISOString().split("T")[0]}.txt`;
                  a.click(); URL.revokeObjectURL(u);
                }} style={{background:"#FF6B35",color:"#080808",border:"none",borderRadius:3,padding:"10px 16px",fontSize:9,letterSpacing:1.5,textTransform:"uppercase",fontFamily:"inherit",fontWeight:700,cursor:"pointer",width:"100%"}}>
                  ⬇ Download Links TXT
                </button>
              </div>

              <div style={{background:"#0a0a0a",border:"1px solid #111",borderRadius:5,padding:11,marginTop:4}}>
                <div style={{fontSize:9,color:"#222",lineHeight:2}}>
                  Days logged: <span style={{color:"#47FFB4"}}>{Object.keys(loadData()).filter(k=>k.match(/^\d{4}-\d{2}-\d{2}$/)).length}</span> &nbsp;·&nbsp;
                  Links saved: <span style={{color:"#FF6B35"}}>{JSON.parse(localStorage.getItem("jafo_links")||"[]").length}</span> &nbsp;·&nbsp;
                  Device only — never sent to any server.
                </div>
              </div>

            </div>}

          </div>

          <div style={{borderTop:"1px solid #0d0d0d",padding:"10px 16px",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:6,paddingBottom:"max(10px,env(safe-area-inset-bottom))"}}>
            <div style={{fontSize:7,color:"#1a1a1a",letterSpacing:3,textTransform:"uppercase"}}>JÄFO · Sunday March 1 2026</div>
            <div style={{fontSize:7,color:"#1a1a1a",letterSpacing:2,textTransform:"uppercase"}}>Energy · Revenue · Never Ego</div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App/>, document.getElementById("root"));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(()=>{});
    }
  </script>
</body>
</html>
